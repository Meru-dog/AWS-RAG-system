<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG Document Search</title>
<style>
  :root {
    --ink: #1c1c1e;
    --paper: #faf9f6;
    --line: #d9d6cf;
    --muted: #6b6862;
    --accent: #3a5a6b;
    --accent-weak: #eef2f3;
    --error: #8a3b2e;
    --ok: #3c6e47;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--paper); color: var(--ink);
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic UI", Meiryo, system-ui, sans-serif;
    line-height: 1.7;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 32px 20px 80px; }
  header { border-bottom: 1px solid var(--line); padding-bottom: 16px; margin-bottom: 28px; display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
  h1 { font-size: 18px; font-weight: 600; letter-spacing: .04em; margin: 0; }
  .session { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 12px; }
  button { font: inherit; cursor: pointer; border: 1px solid var(--accent); background: var(--accent); color: #fff; padding: 8px 16px; border-radius: 4px; }
  button.ghost { background: transparent; color: var(--accent); }
  button:disabled { opacity: .5; cursor: default; }
  textarea { width: 100%; min-height: 96px; resize: vertical; font: inherit; padding: 12px; border: 1px solid var(--line); border-radius: 4px; background: #fff; color: var(--ink); }
  .row { display: flex; justify-content: flex-end; margin-top: 12px; }
  .gate { text-align: center; padding: 80px 0; }
  .gate p { color: var(--muted); margin-bottom: 24px; }
  .section { margin-bottom: 36px; }
  .section-label { font-size: 13px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin: 0 0 12px; font-weight: 600; }
  .upload-box { border: 1px dashed var(--line); border-radius: 6px; padding: 20px; background: #fff; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .upload-box input[type=file] { font: inherit; flex: 1; min-width: 200px; }
  .answer h2 { font-size: 13px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin: 0 0 8px; font-weight: 600; }
  .answer-body { white-space: pre-wrap; background: #fff; border: 1px solid var(--line); border-left: 3px solid var(--accent); padding: 16px; border-radius: 4px; }
  .cites { margin-top: 24px; }
  .cite { background: var(--accent-weak); border-radius: 4px; padding: 12px 14px; margin-bottom: 10px; font-size: 14px; }
  .cite .uri { font-family: ui-monospace, monospace; font-size: 12px; color: var(--accent); word-break: break-all; margin-bottom: 6px; }
  .cite .snip { color: var(--muted); }
  .status { font-size: 14px; margin-top: 12px; }
  .status.muted { color: var(--muted); }
  .status.err { color: var(--error); }
  .status.ok { color: var(--ok); }
  .hidden { display: none; }
  .divider { border: 0; border-top: 1px solid var(--line); margin: 0 0 36px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>RAG DOCUMENT SEARCH</h1>
    <div class="session" id="session"></div>
  </header>

  <div id="gate" class="gate hidden">
    <p>続行するにはログインが必要です。</p>
    <button id="loginBtn">ログイン</button>
  </div>

  <div id="app" class="hidden">

    <div class="section">
      <p class="section-label">文書をアップロード</p>
      <div class="upload-box">
        <input type="file" id="fileInput" accept=".txt,.pdf,.md,.csv,.html,.doc,.docx">
        <button id="uploadBtn">アップロード</button>
      </div>
      <div id="uploadStatus" class="status hidden"></div>
    </div>

    <hr class="divider">

    <div class="section">
      <p class="section-label">文書に質問する</p>
      <textarea id="question" placeholder="文書に関する質問を入力してください。"></textarea>
      <div class="row"><button id="askBtn">質問する</button></div>
      <div id="status" class="status hidden"></div>
      <div id="answer" class="answer hidden">
        <h2>回答</h2>
        <div class="answer-body" id="answerBody"></div>
        <div class="cites" id="cites"></div>
      </div>
    </div>

  </div>
</div>

<script>
// ===== 設定(実値に置き換え)=====
const CONFIG = {
  cognitoDomain: "https://<COGNITO_DOMAIN_PREFIX>.auth.ap-northeast-1.amazoncognito.com",
  clientId: "<新ClientId>",
  redirectUri: "https://<CLOUDFRONT_DOMAIN>/",
  apiUrl: "https://<FUNCTION_URL_ID>.lambda-url.ap-northeast-1.on.aws/",
  scope: "openid email profile"
};

let idToken = null;

// ---- PKCE ----
function randomString(len) {
  const arr = new Uint8Array(len);
  crypto.getRandomValues(arr);
  return Array.from(arr, b => ("0" + (b & 0xff).toString(16)).slice(-2)).join("");
}
function base64UrlEncode(bytes) {
  let str = "";
  bytes.forEach(b => str += String.fromCharCode(b));
  return btoa(str).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}
async function sha256(text) {
  const data = new TextEncoder().encode(text);
  const hash = await crypto.subtle.digest("SHA-256", data);
  return new Uint8Array(hash);
}
async function login() {
  const verifier = randomString(48);
  const state = randomString(16);
  sessionStorage.setItem("pkce_verifier", verifier);
  sessionStorage.setItem("oauth_state", state);
  const challenge = base64UrlEncode(await sha256(verifier));
  const params = new URLSearchParams({
    response_type: "code", client_id: CONFIG.clientId, redirect_uri: CONFIG.redirectUri,
    scope: CONFIG.scope, state: state, code_challenge: challenge, code_challenge_method: "S256"
  });
  window.location.href = CONFIG.cognitoDomain + "/oauth2/authorize?" + params.toString();
}
async function handleCallback() {
  const url = new URL(window.location.href);
  const code = url.searchParams.get("code");
  const state = url.searchParams.get("state");
  if (!code) return false;
  const savedState = sessionStorage.getItem("oauth_state");
  const verifier = sessionStorage.getItem("pkce_verifier");
  if (!verifier || state !== savedState) return false;
  const body = new URLSearchParams({
    grant_type: "authorization_code", client_id: CONFIG.clientId,
    code: code, redirect_uri: CONFIG.redirectUri, code_verifier: verifier
  });
  const res = await fetch(CONFIG.cognitoDomain + "/oauth2/token", {
    method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" }, body: body.toString()
  });
  if (!res.ok) return false;
  const tokens = await res.json();
  idToken = tokens.id_token;
  sessionStorage.removeItem("pkce_verifier");
  sessionStorage.removeItem("oauth_state");
  window.history.replaceState({}, document.title, CONFIG.redirectUri);
  return true;
}
function logout() {
  idToken = null;
  const params = new URLSearchParams({ client_id: CONFIG.clientId, logout_uri: CONFIG.redirectUri });
  window.location.href = CONFIG.cognitoDomain + "/logout?" + params.toString();
}

// ---- 質問 ----
async function ask() {
  const q = document.getElementById("question").value.trim();
  if (!q) return;
  const askBtn = document.getElementById("askBtn");
  const status = document.getElementById("status");
  const answer = document.getElementById("answer");
  askBtn.disabled = true;
  answer.classList.add("hidden");
  status.className = "status muted";
  status.textContent = "検索しています...";
  status.classList.remove("hidden");
  try {
    const res = await fetch(CONFIG.apiUrl, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + idToken },
      body: JSON.stringify({ action: "question", question: q })
    });
    if (res.status === 401) { sessionExpired(status); return; }
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "リクエストに失敗しました。");
    renderAnswer(data);
    status.classList.add("hidden");
  } catch (e) {
    status.className = "status err";
    status.textContent = "エラー: " + e.message;
  } finally {
    askBtn.disabled = false;
  }
}
function renderAnswer(data) {
  document.getElementById("answerBody").textContent = data.answer || "";
  const cites = document.getElementById("cites");
  cites.innerHTML = "";
  (data.citations || []).forEach(c => {
    const div = document.createElement("div"); div.className = "cite";
    const uri = document.createElement("div"); uri.className = "uri"; uri.textContent = c.uri || "";
    const snip = document.createElement("div"); snip.className = "snip"; snip.textContent = c.snippet || "";
    div.appendChild(uri); div.appendChild(snip); cites.appendChild(div);
  });
  document.getElementById("answer").classList.remove("hidden");
}

// ---- アップロード ----
async function upload() {
  const input = document.getElementById("fileInput");
  const status = document.getElementById("uploadStatus");
  const btn = document.getElementById("uploadBtn");
  if (!input.files || input.files.length === 0) {
    status.className = "status err"; status.textContent = "ファイルを選択してください。";
    status.classList.remove("hidden");
    return;
  }
  const file = input.files[0];
  btn.disabled = true;
  status.className = "status muted"; status.textContent = "アップロード準備中...";
  status.classList.remove("hidden");
  try {
    // 1. presigned URL を要求
    const res = await fetch(CONFIG.apiUrl, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + idToken },
      body: JSON.stringify({ action: "upload", filename: file.name })
    });
    if (res.status === 401) { sessionExpired(status); return; }
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "URL発行に失敗しました。");

    // 2. S3 へ直接 PUT
    status.textContent = "アップロード中...";
    const put = await fetch(data.upload_url, { method: "PUT", body: file });
    if (!put.ok) throw new Error("S3へのアップロードに失敗しました。");

    status.className = "status ok";
    status.textContent = "アップロード完了。取り込み処理が自動で始まります(反映まで数分かかります)。";
    input.value = "";
  } catch (e) {
    status.className = "status err";
    status.textContent = "エラー: " + e.message;
  } finally {
    btn.disabled = false;
  }
}

function sessionExpired(status) {
  status.className = "status err";
  status.textContent = "セッションが切れています。再ログインしてください。";
  idToken = null;
  showGate();
}

// ---- 画面切り替え ----
function showApp() {
  document.getElementById("gate").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  document.getElementById("session").innerHTML = '<span>ログイン中</span>';
  const out = document.createElement("button");
  out.className = "ghost"; out.textContent = "ログアウト"; out.onclick = logout;
  document.getElementById("session").appendChild(out);
}
function showGate() {
  document.getElementById("app").classList.add("hidden");
  document.getElementById("gate").classList.remove("hidden");
  document.getElementById("session").textContent = "";
}

// ---- 初期化 ----
(async function init() {
  document.getElementById("loginBtn").onclick = login;
  document.getElementById("askBtn").onclick = ask;
  document.getElementById("uploadBtn").onclick = upload;
  const loggedIn = await handleCallback();
  if (loggedIn && idToken) { showApp(); } else { showGate(); }
})();
</script>
</body>
</html>
